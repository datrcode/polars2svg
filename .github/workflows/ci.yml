name: CI

# Clean-room install verification on Linux (PyPI must-do #9).
# Every prior test run was macOS/arm64; this exercises the built wheel on
# linux/amd64 inside a stock python:3.13-slim image — a genuine clean room
# (no preinstalled project deps, no system Python packages) — to catch
# platform-dependent path handling, the mlx import guard, and font-metric
# non-determinism in the golden-image tests.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  # Lets release.yml invoke this same suite as a pre-publish gate, so the tests
  # that guard a release are literally the tests that run on every commit — not
  # a second copy that can drift. Tag pushes do not match `branches: [main]`
  # above, so without this the tagged commit would otherwise never be tested.
  workflow_call:

jobs:
  # Type-check the public surface (PyPI nice-to-have #1). The package ships a
  # py.typed marker, so downstream checkers read our hints; this guards that the
  # public signatures stay valid. The [tool.mypy] config in pyproject.toml relaxes
  # the error codes that fire only on the library's internal dynamic idiom.
  type-check:
    name: mypy (public surface)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        run: pip install --no-cache-dir uv
      - name: Run mypy
        run: uvx mypy polars2svg

  # Security/quality automation (PyPI nice-to-have #5).
  security-and-quality:
    name: bandit + pip-audit + ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7

      - name: bandit (static security scan)
        # Findings are either fixed or annotated in-line with a justified
        # `# nosec <code> - <reason>` (see SECURITY.md's threat model for why
        # e.g. random.randint()-based SVG id scoping and the background=
        # shape-descriptor XML parsing are not vulnerabilities here). A clean
        # run means every remaining flag has been reviewed and accepted.
        run: uvx bandit -r polars2svg/

      - name: pip-audit (known-vulnerable dependency scan)
        # Audits the published surface: exactly what a bare `pip install
        # polars2svg` resolves. Deliberately not --all-extras — that includes
        # mlx-cuda/mlx-cuda13, whose Linux-only NVIDIA wheels are kept out of
        # `all` on purpose (see [project.optional-dependencies]). They resolve to
        # a no-op on macOS but pull the whole CUDA stack onto this runner.
        run: |
          uv export --no-hashes --no-dev --no-emit-project -o /tmp/requirements-audit.txt
          uvx pip-audit -r /tmp/requirements-audit.txt

      - name: ruff (E9, F)
        # Minimal rule set on purpose — see the [tool.ruff] comment in
        # pyproject.toml. Catches syntax errors and pyflakes issues (undefined
        # names, unused imports/variables, duplicate dict keys) without
        # fighting the codebase's distinctive style.
        run: uvx ruff check polars2svg/

  linux-cleanroom:
    name: Linux clean-room wheel install + tests
    runs-on: ubuntu-latest
    container: python:3.13-slim
    steps:
      # git lets actions/checkout use a fast clone instead of the REST tarball.
      # The rest are pycairo's build dependencies: pycairo publishes Windows-only
      # wheels, so on Linux the rlPyCairo -> pycairo chain compiles from the sdist
      # and needs a C toolchain plus cairo's headers. slim ships neither.
      - name: Install git and pycairo's build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            git build-essential libcairo2-dev pkg-config

      - uses: actions/checkout@v7

      - name: Build the wheel
        run: |
          pip install --no-cache-dir uv
          uv build

      - name: Install the built wheel into a clean environment
        run: pip install --no-cache-dir dist/*.whl

      - name: Import smoke test
        run: python -c "import polars2svg; print('import ok')"

      - name: Install test-only dependencies
        # The bare wheel above proves `pip install polars2svg` imports; the suite
        # itself needs more. Resolve the extras through the wheel rather than
        # re-listing their contents here — a hand-kept list silently drifts from
        # [project.optional-dependencies] (it had already lost scipy, networkx,
        # shapely and param, which is 15 collection errors and zero tests run).
        # These three are exactly what [dependency-groups] dev carries. mlx is
        # deliberately absent: the suite is meant to run without it, which is what
        # exercises tfdp_layout.py's import guard.
        #
        # export brings svglib+reportlab+rlPyCairo. rlPyCairo is reportlab 5.x's
        # renderPM backend on Linux (macOS has its own); without it svglib
        # rasterization errors out. The PNG-RMS golden tests skip off macOS
        # regardless, but the backend is needed for any that force-run.
        run: |
          pip install --no-cache-dir "$(echo dist/*.whl)[interactive,layouts,export]"
          pip install --no-cache-dir pytest kagglehub

      - name: Run the test suite
        # test_performance.py needs a machine-local baseline (gitignored);
        # kaggle-backed t-field tests need network/credentials. Both excluded,
        # matching must-do #9.
        run: python -m pytest tests/ -q --ignore=tests/test_performance.py -k 'not tfield'
