name: Release

# Publishes polars2svg to PyPI via Trusted Publishing (OIDC) on release tags.
#
# Runs only when a tag matching v* is pushed (e.g. `git tag vX.Y.Z && git push
# origin vX.Y.Z`). The `ci` job below calls ci.yml as a reusable workflow, so
# the full suite must pass against the tagged commit before anything is built
# or published. This gate exists because a tag push does NOT trigger ci.yml on
# its own (ci.yml is push-on-main + PR), and because v0.1.1 shipped while CI
# was red on the same commit — build+publish had no test dependency at all.
#
# Trusted Publishing is registered and live (first used for v0.1.0, 2026-07-10);
# there is no API token to manage. The maintainer-only, browser-only setup is
# already done — re-registration is needed only if the repo is renamed or moved,
# at https://pypi.org/manage/account/publishing/ with workflow name `release.yml`
# and environment name `pypi`. Step-by-step release instructions live in the
# polars2svg_dev repo's pypi_instructions.txt.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # Pre-publish gate: the same jobs that run on every push to main (mypy,
  # bandit/pip-audit/ruff, and the Linux clean-room wheel install + test suite),
  # executed against the tagged commit. A failure here stops the release before
  # anything is built or uploaded.
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build sdist + wheel
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build distributions
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing: no API token/secret. PyPI verifies the OIDC identity
    # of this workflow running in the `pypi` environment.
    environment:
      name: pypi
      url: https://pypi.org/project/polars2svg/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
